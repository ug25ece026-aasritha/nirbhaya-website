<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nirbhaya</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: white;
            font-family: Arial;
        }

        .box {
            background: #e8ded4;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        img {
            width: 150px;
        }

        h2 {
            font-family: cursive;
            color: #333;
        }

        p {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <img src="logo.png" alt="logo">
    <h2>Nirbhaya</h2>
</div>

<p>Your Safety, Our Priority</p>

</body>
</html>
